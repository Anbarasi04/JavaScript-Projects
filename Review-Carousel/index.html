<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <link rel="stylesheet" href="index.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/4.7.0/css/font-awesome.min.css">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Review Card</title>
</head>
<body>
     <div class="rev-cont">
        <div class="title">
             <h2>Our Reviews</h2>
             <div class="underline"></div>
        </div>

        <article class="review">
            <div class="img-cont">
                <img id="per-img" src="..\public\Img1.jpg">
            </div>
            <h4 id="author">Anbu C</h4>
            <p id="job">Software Developer</p>
            <p id="info">Works on developing full-stack applications using HTML, CSS, Javascript, Angular, React, Databases, Node, Express, etc;</p>
            <div class="button-container">
                <button class="prev-btn">
                      <i class="fa fa-arrow-left"></i>
                </button>
                <button class="next-btn">
                     <i class="fa fa-arrow-right"></i>
                </button>
            </div>
            <button class="random-btn">Surprise me</button>
        </article>
    </div>

    <script src="index.js"></script>
</body>
</html>
