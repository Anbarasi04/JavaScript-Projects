<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <link href="index.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/4.7.0/css/font-awesome.min.css">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Questions</title>
</head>
<body>
    <div class="container">
        <div class="title"><h2>General Questions</h2></div>
       
        <article class="question">
            <div class="question-title">
                <p>Do you like coffee or tea?</p>
                <button class="question-btn">
                    <span class="plus-icon"><i class="fa fa-plus-square"></i></span>
                    <span class="minus-icon"><i class="fa fa-minus-square"></i></span>
                </button>
            </div>

            <hr>

            <div class="question-text">
                <p>I like to drink coffee.</p>
            </div>
        </article>

        <article class="question">
            <div class="question-title">
                <p>Do you like coding?</p>
                <button class="question-btn">
                    <span class="plus-icon"><i class="fa fa-plus-square"></i></span>
                    <span class="minus-icon"><i class="fa fa-minus-square"></i></span>
                </button>
            </div>

            <hr>

            <div class="question-text">
                <p>Yes, I enjoy coding.</p>
            </div>
        </article>

        <article class="question">
            <div class="question-title">
                <p>What is HTML?</p>
                <button class="question-btn">
                    <span class="plus-icon"><i class="fa fa-plus-square"></i></span>
                    <span class="minus-icon"><i class="fa fa-minus-square"></i></span>
                </button>
            </div>

            <hr>

            <div class="question-text">
                <p>HTML(HyperText Markup Language) used to structure web pages.</p>
            </div>
        </article>
        </div>

        <script src="index.js"></script>
</body>
</html>
